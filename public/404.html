<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NVNS Software Solutions</title>
    <script>
      // Simple SPA fallback for GitHub Pages with custom domain:
      // On unknown routes, redirect back to the app root (/)
      (function () {
        var base = '/';
        if (location.pathname !== base) {
          location.replace(base);
        }
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to NVNS Software Solutions...</p>
  </body>
  </html>
